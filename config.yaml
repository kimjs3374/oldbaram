capture:
  monitor_index: 1
  fps_target: 60

vision:
  # weights 항목은 의도적으로 생략 → src/config.py 기본값 사용
  # 기본값은 ROOT/dataset/runs/full_v3/weights/best.pt (nc=2 yolov8s red_tab/white_tab)
  # 특정 PC에서 다른 가중치 쓰려면 아래처럼 지정:
  #   weights: C:\oldbaram\dataset\runs\full_v3\weights\best.pt
  imgsz: 608   # 사용자 요청 600 → 32 배수 보정(608). best.onnx dynamic이라 재export 불필요
  conf: 0.25
  half: true
  device: -1   # ONNX CPU 강제 (GPU 경합 spike 회피)

ocr:
  # 격수 PC 캡처 1333x720 기준으로 실측 보정.
  coord_w: 160
  coord_h: 28
  coord_right_pad: 115
  coord_bottom_pad: 4
  coord_upscale: 4
  map_w: 220
  map_h: 28
  map_top_pad: 8
  map_left_pad: 420
  map_upscale: 3
  ocr_every_n_frames: 10

net:
  port: 54545
  send_rate_hz: 30
  # 힐러 PC들 IP (Tailscale). 각 PC에서 필요시 수정.
  peers:
    - 100.75.199.37
    - 100.117.1.46
  bind_host: 0.0.0.0

input:
  target_window: msw.exe
  keydown_ms_min: 30
  keydown_ms_max: 70
  jitter_ms: 50
  method: sendinput

fsm:
  red_lost_sec: 1.0
  stuck_sec: 3.0
  dead_reckon_sec: 2.0
  nav_mode: shadow   # NavBrain 경로학습: off|shadow|on (경로 딥러닝 학습.md). shadow=로그만
